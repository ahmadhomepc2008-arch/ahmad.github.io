<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الموقع تحت الصيانة | أسامة فودة</title>
    <style>
        /* إعدادات الخلفية والألوان العامة */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f1ee; 
            color: #5d4037;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            text-align: center;
            padding: 40px;
            border: 2px solid #8d6e63;
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
        }

        /* --- تأثير حركة العجل (الدوران) --- */
        .icon {
            font-size: 60px;
            margin-bottom: 20px;
            color: #8d6e63;
            display: inline-block;
            /* استدعاء الحركة: اسم الحركة، المدة، نوع السرعة، تكرار لا نهائي */
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        /* ------------------------------- */

        h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            color: #4e342e;
        }

        .line {
            height: 3px;
            width: 60px;
            background-color: #8d6e63;
            margin: 20px auto;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.7;
            margin-bottom: 15px;
        }

        .footer-text {
            font-size: 0.85rem;
            margin-top: 30px;
            color: #a1887f;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">⚙️</div>
        
        <h1>موقع الأستاذ أسامة فودة</h1>
        <div class="line"></div>
        
        <p>نعتذر منكم عن التاخير، الموقع حالياً في مرحلة <strong>تحديث وصيانة </strong>.</p>
        <p>نعمل بجد لنعود إليكم بأفضل حُلّة قريباً.</p>
        <p>سوف نعود يوم الخميس الموافق 23/4/2026</p>
        <div class="footer-text">
            حقوق النشر محفوظة للأستاذ أسامة فودة &copy; 2026
        </div>
    </div>

</body>
</html>
